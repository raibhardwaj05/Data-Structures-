<!DOCTYPE html>
<html>
<body>

<input id="n" placeholder="Enter number">
<button onclick="check()">Check</button>

<p id="r"></p>

<script>
function check(){
    let n = parseInt(document.getElementById('n').value);

    if(n<=1) return r.innerText = "Not Prime";

    for(let i=2;i<=Math.sqrt(n);i++)
        if(n%i==0) return r.innerText = "Not Prime";

    r.innerText = "Prime";
}
</script>

</body>
</html>
