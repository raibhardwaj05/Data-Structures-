<!DOCTYPE html>
<html>
<body>

<h3>Login</h3>

<form id="f">
    <input id="e" placeholder="Email" required><br><br>
    <input id="p" type="password" placeholder="Password" required><br><br>
    <button>Login</button>
</form>

<script>
f.onsubmit = e => {
    e.preventDefault();

    let email = e.target.e.value;
    let pass = e.target.p.value;

    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
        return alert("Invalid Email");

    fetch('login.php',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: email, password: pass })
    })
    .then(r=>r.json())
    .then(d=>alert(d.message));
}
</script>

</body>
</html>
